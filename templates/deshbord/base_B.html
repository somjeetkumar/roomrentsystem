{% include 'components/loader.html' %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Room - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-orange: #ff5a01;
            --primary-blue: #007bff;
        }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Sidebar Styling */
        .sidebar {
            min-height: 100vh;
            background: #fff;
            border-right: 1px solid #dee2e6;
        }
        .nav-link { color: #333; padding: 12px 20px; border-radius: 5px; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active {
            background-color: var(--primary-orange);
            color: white !important;
        }
        
        /* Card Styling */
        .stat-card { border: none; border-radius: 12px; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-5px); }
        .btn-orange { background-color: var(--primary-orange); color: white; border: none; }
        .btn-orange:hover { background-color: #e44d00; color: white; }
        
        .room-img-sm { width: 80px; height: 60px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-3 shadow-sm">
            <div class="mb-4 text-center">
                <h4 class="fw-bold text-dark"><span style="color:var(--primary-orange)">FIND</span> ROOM</h4>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link active" href="#"><i class="fas fa-th-large me-2"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'RoomList' %}"><i class="fas fa-bed me-2"></i> My Rooms</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'renterList' %}"><i class="fas fa-calendar-check me-2"></i> Renters</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'ownerList' %}"><i class="fas fa-user me-2"></i> Owners</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}"><i class="fas fa-user me-2"></i> Back to website</a></li>
                <hr>
                <li class="nav-item"><a class="nav-link text-danger" href="{% url 'logout' %}"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
            </ul>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Welcome back, Sohan!</h1>
                <button class="btn btn-orange" onclick="addNewRoom()"><i class="fas fa-plus me-2"></i>Add New Room</button>
            </div>

            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="card stat-card shadow-sm p-3">
                        <div class="d-flex align-items-center">
                            <div class="p-3 bg-light rounded-circle me-3"><i class="fas fa-home text-primary fs-4"></i></div>
                            <div><h6 class="text-muted mb-0">Total Rooms</h6><h3 class="fw-bold mb-0">12</h3></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card shadow-sm p-3">
                        <div class="d-flex align-items-center">
                            <div class="p-3 bg-light rounded-circle me-3"><i class="fas fa-users text-success fs-4"></i></div>
                            <div><h6 class="text-muted mb-0">Active Tenants</h6><h3 class="fw-bold mb-0">8</h3></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card shadow-sm p-3">
                        <div class="d-flex align-items-center">
                            <div class="p-3 bg-light rounded-circle me-3"><i class="fas fa-wallet text-warning fs-4"></i></div>
                            <div><h6 class="text-muted mb-0">Total Revenue</h6><h3 class="fw-bold mb-0">₹24,000</h3></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold">Manage Your Listings</h5>
                </div>

                {% block content %}

                {% endblock %}


            </div>
        </main>
    </div>
</div>
    <script src="{% static 'js/loader.js' %}"></script>

<script>
    function addNewRoom() {
        alert("Redirecting to room upload form...");
    }

    function deleteRoom(btn) {
        if(confirm("Are you sure you want to delete this listing?")) {
            btn.closest('tr').remove();
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
